name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      # The ml feature pulls heavy ONNX deps; type-check it without downloading
      # models or running the model-backed tests.
      - name: Build (ml feature)
        run: cargo build --features ml

  doc-coherence:
    name: staleguard self-check (Layer 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install staleguard
        run: cargo install --path .

      # Advisory: dogfood staleguard on its own prose docs. Scoped to the docs so it
      # checks doc-vs-code drift (broken refs, contradictions, stale claims) and
      # skips the repo-wide coverage pass. Non-blocking because the docs mention
      # example filenames (package.json, CLAUDE.md) that exist in *user* repos,
      # not this one — findings are surfaced in the log without gating CI.
      - name: Check docs against code
        run: staleguard check --doc README.md --doc DETAILS.md --format json
        continue-on-error: true
